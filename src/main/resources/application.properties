spring.application.name=satelite
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:${PORTA_API:9090}}

# SQL Server - auditoria e cursor do ETL
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.url=${SATELITE_DB_URL:${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=SATELITE_TMS_AUDITORIA;encrypt=true;trustServerCertificate=true}}
spring.datasource.username=${SATELITE_DB_USER:${DB_USER:}}
spring.datasource.password=${SATELITE_DB_PASSWORD:${DB_PASSWORD:}}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.default_schema=dbo
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.sql.init.mode=never

# Configuracoes externas ficam no arquivo .env ou nas variaveis de ambiente.
# Consulte database/config/env.example.properties para ver as chaves esperadas.

# Timeouts HTTP REST para APIs externas via OpenFeign.
spring.cloud.openfeign.client.config.rodogarciaClient.connect-timeout=${RODOGARCIA_CONNECT_TIMEOUT_MS:30000}
spring.cloud.openfeign.client.config.rodogarciaClient.read-timeout=${RODOGARCIA_READ_TIMEOUT_MS:60000}
spring.cloud.openfeign.client.config.ppgClient.connect-timeout=${PPG_CONNECT_TIMEOUT_MS:30000}
spring.cloud.openfeign.client.config.ppgClient.read-timeout=${PPG_READ_TIMEOUT_MS:60000}

# Whitelist opcional para isolar testes de NF-e na PPG / OK Entrega.
app.ppg.nfe-whitelist-enabled=${PPG_NFE_WHITELIST_ENABLED:false}
app.ppg.nfe-whitelist=${PPG_NFE_WHITELIST:}

# Janela da imagem original usada como canhoto da PPG.
app.ppg.image-crop-start-ratio=${PPG_IMAGE_CROP_START_RATIO:0.60}
app.ppg.image-crop-height-ratio=${PPG_IMAGE_CROP_HEIGHT_RATIO:0.20}

# Logs
logging.level.com.example.satelite=${APP_LOG_LEVEL:INFO}
logging.level.com.example.satelite.clients=DEBUG
