spring.application.name=satelite
spring.config.import=optional:file:.env[.properties]

# SQL Server - auditoria e cursor do ETL
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.url=${SATELITE_DB_URL:${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=SATELITE_TMS_AUDITORIA;encrypt=true;trustServerCertificate=true}}
spring.datasource.username=${SATELITE_DB_USER:${DB_USER:}}
spring.datasource.password=${SATELITE_DB_PASSWORD:${DB_PASSWORD:}}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.default_schema=dbo
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.sql.init.mode=never

# Configuracoes externas ficam no arquivo .env ou nas variaveis de ambiente.
# Consulte database/config/env.example.properties para ver as chaves esperadas.

# Whitelist opcional para isolar testes de NF-e na PPG / OK Entrega.
app.ppg.nfe-whitelist-enabled=${PPG_NFE_WHITELIST_ENABLED:false}
app.ppg.nfe-whitelist=${PPG_NFE_WHITELIST:}

# Percentual inferior da imagem original usado como canhoto da PPG.
app.ppg.image-bottom-crop-ratio=${PPG_IMAGE_BOTTOM_CROP_RATIO:0.18}

# Logs
logging.level.com.example.satelite=${APP_LOG_LEVEL:INFO}
logging.level.com.example.satelite.clients=DEBUG
