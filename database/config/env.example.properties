# Copie para .env na raiz do projeto e preencha com valores reais.

# Servidor HTTP da API Satelite
SERVER_PORT=9090
PORTA_API=9090

# SQL Server
DB_SERVER=localhost
DB_NAME=SATELITE_TMS_AUDITORIA
DB_TRUST_SERVER_CERTIFICATE=true
DB_URL=jdbc:sqlserver://localhost:1433;databaseName=SATELITE_TMS_AUDITORIA;encrypt=true;trustServerCertificate=true
DB_ADMIN_USER=
DB_ADMIN_PASSWORD=
DB_USER=sa
DB_PASSWORD=SUA_SENHA
SATELITE_DB_URL=jdbc:sqlserver://localhost:1433;databaseName=SATELITE_TMS_AUDITORIA;encrypt=true;trustServerCertificate=true
SATELITE_DB_USER=sa
SATELITE_DB_PASSWORD=SUA_SENHA

# Rodogarcia / ESL Cloud
RODOGARCIA_API_BASE_URL=https://api.exemplo-rodogarcia.com.br
RODOGARCIA_CUSTOMER_OCCURRENCES_PATH=/api/customer/invoice_occurrences
RODOGARCIA_CTE_XML_PATH=/api/ctes
RODOGARCIA_MASTER_API_REST=TOKEN_ESL_MASTER_REST
RODOGARCIA_TOKEN_PPG=TOKEN_ESL_PPG
RODOGARCIA_TOKEN_VEDACIT=TOKEN_ESL_VEDACIT

# PPG / OK Entrega
PPG_API_BASE_URL=https://hml.okentrega.com.br
PPG_API_USER=USUARIO_PPG
PPG_API_PASSWORD=SENHA_PPG
PPG_ENTREGADOR_ID=ID_ENTREGADOR
PPG_CNPJ_TRANSPORTADORA=CNPJ_TRANSPORTADORA
PPG_NFE_WHITELIST_ENABLED=false
PPG_NFE_WHITELIST=

# Vedacit / MultiTMS
VEDACIT_API_BASE_URL=https://api.exemplo-vedacit.com.br/NFe.svc
VEDACIT_API_TOKEN=TOKEN_VEDACIT

# Scheduler e paginacao
APP_SCHEDULER_ENABLED=true
INTEGRATION_SCHEDULER_INTERVAL_MS=60000
INTEGRATION_MAX_PAGES_PER_CYCLE=10

# Limites operacionais ESL Cloud
ESL_MIN_INTERVAL_BETWEEN_REQUESTS_MS=2000
ESL_PERIOD_FREE_LIMIT_DAYS=30
ESL_PERIOD_MEDIUM_LIMIT_DAYS=183
ESL_PERIOD_MEDIUM_COOLDOWN_MS=3600000
ESL_PERIOD_LONG_COOLDOWN_MS=43200000
INTEGRATION_TRANSIENT_BACKOFF_MS=15000

# Download de imagens assinadas
IMAGE_DOWNLOAD_CONNECT_TIMEOUT_SECONDS=10
IMAGE_DOWNLOAD_REQUEST_TIMEOUT_SECONDS=30
IMAGE_DOWNLOAD_MAX_ATTEMPTS=3
IMAGE_DOWNLOAD_RETRY_DELAY_MS=15000

# Logs
APP_LOG_LEVEL=INFO
